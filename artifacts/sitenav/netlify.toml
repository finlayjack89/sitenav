[build]
  functions = "netlify/functions"
  command = "echo 'No build step required'"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/sitenav/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/sitenav/admin/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/sitenav/admin"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
