kind = "web"
previewPath = "/sitenav/"
title = "SiteNav"
version = "1.0.0"
id = "artifacts/sitenav"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/sitenav/" ]
localPort = 22849

[services.development]
run = "pnpm --filter @workspace/sitenav run dev"

[services.production]
run = ["node", "artifacts/sitenav/server.js"]

[services.env]
PORT = "22849"
BASE_PATH = "/sitenav"
