<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E2ED9">
  <meta name="description" content="Yunex Traffic field site navigation">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SiteNav">
  <title>SiteNav — Yunex Traffic</title>
  <link rel="manifest" href="/sitenav/manifest.json">
  <link rel="icon" href="/sitenav/icons/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ═══════ DESIGN TOKENS ═══════ */
    :root {
      --brand: #1E2ED9;
      --brand-dark: #1525b0;
      --green: #00E38C;
      --green-hover: #00cc7d;
      --surface: #FFFFFF;
      --surface-raised: #f8f9fb;
      --surface-muted: #E4EDED;
      --border: #E4EDED;
      --border-subtle: #f0f0f0;
      --text-primary: #0f0f0f;
      --text-secondary: #555;
      --text-tertiary: #888;
      --shadow-brand: rgba(30,46,217,0.08);
      --shadow-brand-md: rgba(30,46,217,0.12);
      --shadow-brand-lg: rgba(30,46,217,0.06);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-xl: 20px;
      --radius-pill: 100px;
      --ease-premium: cubic-bezier(0.32, 0.72, 0, 1);
      --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 150ms;
      --duration-normal: 250ms;
      --duration-slow: 400ms;
    }

    /* ═══════ RESET & BASE ═══════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══════ SUBTLE NOISE TEXTURE ═══════ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* ═══════ FOCUS & TRANSITIONS ═══════ */
    :focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
    :focus:not(:focus-visible) { outline: none; }
    button, a, input, .dd-item, .recent-chip, .saved-item {
      transition:
        background-color var(--duration-normal) var(--ease-premium),
        color var(--duration-normal) var(--ease-premium),
        border-color var(--duration-normal) var(--ease-premium),
        box-shadow var(--duration-normal) var(--ease-premium),
        transform var(--duration-fast) var(--ease-bounce);
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
      }
    }

    /* ═══════ APP SHELL ═══════ */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 700px;
      margin: 0 auto;
      position: relative;
    }

    /* ═══════ HEADER ═══════ */
    header {
      background: var(--brand);
      color: #FFFFFF;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 3px var(--shadow-brand-md), 0 4px 12px var(--shadow-brand-lg);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { height: 20px; width: auto; flex-shrink: 0; }
    .header-divider {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }
    .header-title {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .conn-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      font-weight: 500;
      opacity: 0.85;
      letter-spacing: 0.01em;
    }
    #conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(0,227,140,0.25);
      animation: pulse-dot 2.5s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 2px rgba(0,227,140,0.25); }
      50% { box-shadow: 0 0 0 5px rgba(0,227,140,0.08); }
    }

    /* ═══════ TABS ═══════ */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: relative;
    }
    .tab-btn {
      flex: 1;
      padding: 14px 16px;
      min-height: 48px;
      font-size: 0.88rem;
      font-weight: 500;
      font-family: inherit;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      transition:
        color var(--duration-normal) var(--ease-premium),
        border-color var(--duration-slow) var(--ease-out-expo);
    }
    .tab-btn:hover { background: var(--surface-raised); }
    .tab-btn.tab-active {
      color: var(--brand);
      border-bottom-color: var(--brand);
      font-weight: 600;
    }
    .tab-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ═══════ MAIN CONTENT ═══════ */
    main { flex: 1; padding: 20px 16px; }

    /* ═══════ SEARCH BAR ═══════ */
    #search-wrap { position: relative; margin-bottom: 20px; }
    #search-form { margin: 0; padding: 0; }
    #search-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      min-height: 48px;
      font-size: 1rem;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      outline: none;
      color: var(--text-primary);
      background: var(--surface);
      box-shadow: 0 1px 2px var(--shadow-brand);
      transition:
        border-color var(--duration-normal) var(--ease-premium),
        box-shadow var(--duration-normal) var(--ease-premium);
    }
    #search-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(30,46,217,0.08), 0 1px 2px var(--shadow-brand);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 17px;
      height: 17px;
      color: var(--text-tertiary);
      pointer-events: none;
      transition: color var(--duration-normal) var(--ease-premium);
    }
    #search-input:focus ~ .search-icon,
    #search-form:focus-within .search-icon { color: var(--brand); }

    /* ═══════ SEARCH DROPDOWN ═══════ */
    #search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      max-height: 320px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 30px var(--shadow-brand-md), 0 2px 8px var(--shadow-brand);
    }
    .dd-item {
      display: flex;
      flex-direction: column;
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      min-height: 48px;
      border: none;
      border-bottom: 1px solid var(--border-subtle);
      background: none;
      cursor: pointer;
      gap: 2px;
      position: relative;
      font-family: inherit;
    }
    .dd-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--brand);
      border-radius: 0 3px 3px 0;
      transform: scaleY(0);
      transition: transform var(--duration-normal) var(--ease-bounce);
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item:focus {
      background: var(--surface-raised);
      outline: none;
    }
    .dd-item:hover::before, .dd-item:focus::before {
      transform: scaleY(1);
    }
    .dd-item:active { transform: scale(0.99) translateY(1px); }
    .dd-primary { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
    .dd-secondary { font-size: 0.8rem; color: var(--text-secondary); }
    .dd-item.dd-active { background: rgba(30,46,217,0.04); }
    .dd-item.dd-active::before { transform: scaleY(1); }

    /* ═══════ RECENTLY VIEWED ═══════ */
    #recent-section { margin-bottom: 20px; }
    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    /* ═══════ SITES INCLUDED ═══════ */
    #sites-included { margin-bottom: 28px; }
    #sites-included .sites-heading {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    .sites-list { list-style: none; padding: 0; margin: 0; }
    .sites-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.875rem;
      color: var(--text-primary);
      opacity: 0;
      animation: fade-up 0.5s var(--ease-out-expo) forwards;
    }
    .sites-list li:nth-child(1) { animation-delay: 0.05s; }
    .sites-list li:nth-child(2) { animation-delay: 0.10s; }
    .sites-list li:nth-child(3) { animation-delay: 0.15s; }
    .sites-list li:nth-child(4) { animation-delay: 0.20s; }
    .sites-list li:nth-child(5) { animation-delay: 0.25s; }
    .sites-list li:nth-child(6) { animation-delay: 0.30s; }
    .sites-list li:nth-child(7) { animation-delay: 0.35s; }
    .sites-list li:last-child { border-bottom: none; }
    .sites-list .check-icon {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      margin-top: 2px;
      color: var(--green);
    }
    .sites-list .hint {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-left: 2px;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #recent-items { display: flex; flex-wrap: wrap; gap: 8px; }
    .recent-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 10px 14px;
      min-height: 48px;
      background: var(--surface-muted);
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.8rem;
      max-width: 200px;
      text-align: left;
    }
    .recent-chip:hover {
      background: #dde3e3;
      border-color: var(--border);
      box-shadow: 0 2px 8px var(--shadow-brand);
    }
    .recent-chip:active { transform: scale(0.97) translateY(1px); }
    .chip-no { font-weight: 700; color: var(--brand); font-size: 0.85rem; }
    .chip-ref {
      color: var(--text-secondary);
      font-size: 0.72rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    /* ═══════ STATUS BAR ═══════ */
    .status-bar {
      display: none;
      padding: 10px 16px;
      font-size: 0.85rem;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }
    .status-bar.warn {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      color: #92400e;
    }
    .status-bar.info {
      background: #ecfdf5;
      border: 1px solid var(--green);
      color: #065f46;
    }

    /* ═══════ SAVED TAB ═══════ */
    #saved-list { display: flex; flex-direction: column; gap: 0; }
    .saved-item {
      display: flex;
      flex-direction: column;
      width: 100%;
      text-align: left;
      padding: 14px 0;
      min-height: 48px;
      border: none;
      border-bottom: 1px solid var(--border);
      background: none;
      cursor: pointer;
      gap: 4px;
      font-family: inherit;
    }
    .saved-item:last-child { border-bottom: none; }
    .saved-item:hover { background: var(--surface-raised); }
    .saved-item:active { transform: scale(0.99) translateY(1px); }
    .saved-no { font-weight: 700; color: var(--brand); font-size: 0.95rem; }
    .saved-info { font-size: 0.82rem; color: var(--text-secondary); }
    .empty-msg { color: var(--text-secondary); font-size: 0.9rem; padding: 24px 0; }

    /* ═══════ SITE CARD ═══════ */
    #card-view {
      display: none;
      animation: fade-up 0.4s var(--ease-out-expo) forwards;
    }
    .card-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--brand);
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      padding: 12px 12px 12px 8px;
      margin-left: -8px;
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-radius: var(--radius-sm);
    }
    .back-btn:hover {
      background: rgba(30,46,217,0.05);
    }
    .back-btn:active { transform: translateX(-2px); }
    .back-btn svg { width: 16px; height: 16px; }
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-tertiary);
      padding: 8px 12px;
      min-height: 48px;
      display: flex;
      align-items: center;
      border-radius: var(--radius-sm);
    }
    .star-btn svg { width: 24px; height: 24px; }
    .star-btn.starred { color: var(--brand); }
    .star-btn:hover { background: var(--surface-raised); }
    .star-btn:active { transform: scale(0.9); }

    .card-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .type-badge {
      display: inline-block;
      padding: 5px 14px;
      background: var(--brand);
      color: #FFFFFF;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: var(--radius-pill);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field-list { margin-bottom: 24px; }
    .field-key {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-top: 16px;
      margin-bottom: 3px;
    }
    .field-val {
      font-size: 0.95rem;
      color: var(--text-primary);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-subtle);
      word-break: break-word;
    }

    /* ═══════ MAP SECTIONS (Double-Bezel) ═══════ */
    .map-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 8px;
    }
    @media (min-width: 600px) {
      .map-area { flex-direction: row; }
      .map-section { flex: 1; }
    }
    .map-section {
      /* Outer shell – the "tray" */
      background: rgba(30,46,217,0.03);
      border: 1px solid rgba(30,46,217,0.08);
      border-radius: var(--radius-lg);
      padding: 6px;
    }
    .map-section-inner {
      /* Inner core – the content card */
      background: var(--surface);
      border-radius: calc(var(--radius-lg) - 4px);
      padding: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }
    .map-heading {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--brand);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .map-heading svg { width: 15px; height: 15px; flex-shrink: 0; }
    .w3w-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .w3w-val {
      font-family: 'Inter', monospace;
      font-size: 0.88rem;
      color: var(--brand);
      font-weight: 600;
      word-break: break-all;
      font-variant-numeric: tabular-nums;
    }
    .copy-btn {
      padding: 10px 18px;
      background: var(--brand);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      min-height: 48px;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 1px 3px var(--shadow-brand-md);
    }
    .copy-btn:hover {
      background: var(--brand-dark);
      box-shadow: 0 2px 8px var(--shadow-brand-md);
    }
    .copy-btn:active { transform: scale(0.97) translateY(1px); }
    .copy-btn.copied {
      background: #059669;
      box-shadow: 0 1px 3px rgba(5,150,105,0.2);
    }

    .static-map {
      display: block;
      width: 100%;
      height: auto;
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      background: var(--surface-muted);
      min-height: 150px;
    }
    .map-offline {
      padding: 24px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      background: var(--surface-raised);
      border: 1px dashed var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .map-offline svg { width: 24px; height: 24px; color: var(--text-tertiary); }
    .coord-display {
      font-family: 'Inter', monospace;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
      font-variant-numeric: tabular-nums;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 16px;
      background: var(--green);
      color: var(--text-primary);
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
      border-radius: var(--radius-md);
      text-decoration: none;
      min-height: 48px;
      box-shadow: 0 1px 3px rgba(0,227,140,0.15);
    }
    .nav-btn:hover {
      background: var(--green-hover);
      box-shadow: 0 3px 10px rgba(0,227,140,0.2);
      transform: translateY(-1px);
    }
    .nav-btn:active { transform: scale(0.98) translateY(1px); }
    .nav-btn svg {
      width: 18px;
      height: 18px;
      transition: transform var(--duration-normal) var(--ease-bounce);
    }
    .nav-btn:hover svg { transform: translateX(3px); }

    .w3w-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: #e8170a;
      color: #FFFFFF;
      border-radius: var(--radius-md);
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      min-height: 48px;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 1px 3px rgba(232,23,10,0.15);
    }
    .w3w-link-btn:hover {
      background: #c51409;
      box-shadow: 0 2px 8px rgba(232,23,10,0.2);
      transform: translateY(-1px);
    }
    .w3w-link-btn:active { transform: scale(0.97) translateY(1px); }

    .twin-site-btn {
      background: none;
      border: 1.5px solid rgba(30,46,217,0.2);
      color: var(--brand);
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .twin-site-btn:hover {
      background: rgba(30,46,217,0.04);
      border-color: rgba(30,46,217,0.35);
      box-shadow: 0 2px 8px var(--shadow-brand);
    }
    .twin-site-btn:active { transform: scale(0.97) translateY(1px); }
    .twin-site-btn svg { width: 14px; height: 14px; }

    /* ═══════ LOADING SKELETON ═══════ */
    .skeleton {
      background: linear-gradient(
        90deg,
        var(--surface-muted) 25%,
        var(--surface-raised) 50%,
        var(--surface-muted) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s var(--ease-premium) infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .skeleton { animation: none; background: var(--surface-muted); }
    }

    /* ═══════ FOOTER ═══════ */
    .app-footer {
      text-align: center;
      padding: 28px 16px 36px;
      border-top: 1px solid var(--border);
      margin-top: auto;
      background: var(--surface-raised);
    }
    .footer-logo {
      height: 22px;
      width: auto;
      opacity: 0.45;
      transition: opacity var(--duration-normal) var(--ease-premium);
    }
    .footer-logo:hover { opacity: 0.7; }
    .footer-text {
      font-size: 0.68rem;
      color: var(--text-tertiary);
      margin-top: 8px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-left">
        <img src="/sitenav/icons/yunex-logo-white.svg" alt="Yunex Traffic" class="header-logo">
        <span class="header-divider" aria-hidden="true"></span>
        <span class="header-title">SiteNav</span>
      </div>
      <div class="conn-indicator" role="status" aria-live="polite">
        <span id="conn-dot" aria-hidden="true"></span>
        <span id="conn-label">Online</span>
      </div>
    </header>

    <nav class="tabs" aria-label="Main navigation">
      <button id="tab-search" class="tab-btn tab-active" aria-selected="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Search
      </button>
      <button id="tab-saved" class="tab-btn" aria-selected="false">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        Saved Sites
      </button>
    </nav>

    <main>
      <div id="status-bar" class="status-bar" role="alert" aria-live="polite"></div>

      <div id="search-view">
        <div id="search-wrap">
          <form id="search-form" autocomplete="off" role="search">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input
              id="search-input"
              type="search"
              placeholder="Search by site no., address, or type…"
              aria-label="Search by site number, address, or type"
              autocomplete="off"
              autocorrect="off"
              spellcheck="false"
            >
          </form>
          <div id="search-dropdown" role="listbox" aria-label="Search Results"></div>
        </div>

        <div id="sites-included">
          <p class="sites-heading">Sites Included</p>
          <ul class="sites-list">
            <li>
              <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              <span>Congestion Charge</span>
            </li>
            <li>
              <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              <span>LEZ</span>
            </li>
            <li>
              <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              <span>ULEZ 2021 <span class="hint">(U Number: Uxxxxx)</span></span>
            </li>
            <li>
              <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              <span>ULEZ 2023</span>
            </li>
            <li>
              <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              <span>Monitoring</span>
            </li>
            <li>
              <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              <span>Average Speed</span>
            </li>
            <li>
              <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              <span>Believ <span class="hint">(Drop GB-LCL prefix and search with "Axxxx")</span></span>
            </li>
          </ul>
        </div>

        <div id="recent-section" style="display:none;">
          <p class="section-label">Recently Viewed</p>
          <div id="recent-items"></div>
        </div>
      </div>

      <div id="saved-view" style="display:none;">
        <div id="saved-list"></div>
      </div>

      <div id="card-view"></div>
    </main>

    <footer class="app-footer">
      <img src="/sitenav/icons/yunex-logo-gradient.svg" alt="Yunex Traffic" class="footer-logo">
      <p class="footer-text">© Yunex Traffic</p>
    </footer>
  </div>

  <script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
  }
  </script>
  <script src="/sitenav/app.js?v=9" defer></script>
</body>
</html>
